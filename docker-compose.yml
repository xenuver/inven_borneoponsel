# ============================================================
# Docker Compose — Inventory Borneo Ponsel
# Buildpack: Docker Compose (untuk deploy di Coolify)
# ============================================================

services:
  # ── PostgreSQL Database ────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-inventory_borneo}
      POSTGRES_USER: ${DB_USER:-borneo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-borneo_secret_db_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-borneo} -d ${DB_NAME:-inventory_borneo}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Django + Gunicorn ──────────────────────────────────────
  web:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-changeme-in-production}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-*}
      - DJANGO_CSRF_TRUSTED_ORIGINS=${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      - DB_ENGINE=postgresql
      - DB_NAME=${DB_NAME:-inventory_borneo}
      - DB_USER=${DB_USER:-borneo}
      - DB_PASSWORD=${DB_PASSWORD:-borneo_secret_db_2024}
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-admin123}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
    volumes:
      - static_files:/app/staticfiles



volumes:
  postgres_data:
  static_files:

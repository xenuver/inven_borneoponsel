{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Inventory App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--gray-100); }
        .login-card { background:#fff; border-radius:var(--radius-lg); border:1px solid var(--gray-200); box-shadow:var(--shadow-card); padding:40px 36px; width:100%; max-width:420px; }
        .login-logo { width:48px; height:48px; background:var(--primary); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; font-size:22px; color:white; margin-bottom:20px; }
        .login-title { font-size:20px; font-weight:600; color:var(--gray-700); margin-bottom:4px; }
        .login-sub { font-size:14px; color:var(--text-muted); margin-bottom:28px; }
        .login-label { font-size:14px; font-weight:500; color:var(--gray-700); margin-bottom:6px; display:block; }
        .login-input { border:1px solid var(--gray-200); border-radius:var(--radius-sm); padding:10px 14px; font-size:14px; width:100%; transition:border-color 0.2s; outline:none; }
        .login-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(59,130,246,0.1); }
        .login-btn { width:100%; background:var(--primary); color:white; border:none; border-radius:var(--radius-sm); padding:11px; font-size:15px; font-weight:500; cursor:pointer; transition:opacity 0.2s; margin-top:8px; }
        .login-btn:hover { opacity:0.9; }
        .alert-error { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); border-radius:var(--radius-sm); color:var(--danger); padding:10px 14px; font-size:13px; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
        .input-wrapper { position:relative; margin-bottom:16px; }
        .toggle-pw { position:absolute; right:12px; top:66%; transform:translateY(-50%); cursor:pointer; color:var(--text-muted); font-size:16px; border:none; background:none; padding:0; }
        .toggle-pw:hover { color:var(--gray-700); }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo"><i class="bi bi-box"></i></div>
    <div class="login-title">Selamat Datang</div>
    <div class="login-sub">Masuk ke sistem inventory</div>

    {% if messages %}
    {% for message in messages %}
    <div class="alert-error">
        <i class="bi bi-exclamation-circle"></i> {{ message }}
    </div>
    {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="input-wrapper">
            <label class="login-label">Username</label>
            <input type="text" name="username" class="login-input"
                   placeholder="Masukkan username"
                   value="{{ request.POST.username }}"
                   autocomplete="username" autofocus required>
        </div>

        <div class="input-wrapper">
            <label class="login-label">Password</label>
            <input type="password" name="password" id="passwordInput"
                   class="login-input" placeholder="Masukkan password"
                   autocomplete="current-password"
                   style="padding-right:40px;" required>
            <button type="button" class="toggle-pw" onclick="togglePassword()">
                <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
        </div>

        <button type="submit" class="login-btn">Masuk</button>
    </form>
</div>

<script>
function togglePassword() {
    const input = document.getElementById('passwordInput');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
